<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb84d" />
  <title>Say & See</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-512.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="overlay" class="overlay" hidden>
    <h1 class="overlay-title">Say &amp; See</h1>
    <p class="overlay-text">Tap below so the app can hear you. Then hold the big button and say a word.</p>
    <button id="connect" class="connect">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
      <span>Connect microphone</span>
    </button>
    <p id="overlay-status" class="overlay-status" aria-live="polite"></p>
  </div>

  <main>
    <div id="word" class="word placeholder" role="button" tabindex="0" aria-label="Tap word to hear it">
      Hold the button and say a word
    </div>

    <button id="mic" class="mic" aria-label="Hold to record">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>

    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
