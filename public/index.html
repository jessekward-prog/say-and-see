<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb84d" />
  <title>Say & See</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-512.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <button id="reset" class="reset-btn" type="button" aria-label="Start over">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
  </button>

  <div id="theme-picker" class="theme-picker" role="group" aria-label="Pick a theme">
    <button type="button" class="theme-swatch theme-unicorn" data-theme="unicorn" aria-label="Unicorn theme"></button>
    <button type="button" class="theme-swatch theme-garden" data-theme="garden" aria-label="Garden theme"></button>
    <button type="button" class="theme-swatch theme-underwater" data-theme="underwater" aria-label="Underwater theme"></button>
  </div>

  <div id="overlay" class="overlay" hidden>
    <h1 class="overlay-title">Say &amp; See</h1>
    <p class="overlay-text">Tap below so the app can hear you. Then hold the big button and say a sentence.</p>
    <button id="connect" class="connect">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
      <span>Connect microphone</span>
    </button>
    <p id="overlay-status" class="overlay-status" aria-live="polite"></p>
  </div>

  <main>
    <div class="sentence-stack">
      <p id="sentence" class="sentence placeholder">Hold the button and say a sentence</p>
      <div id="chips" class="chips" hidden aria-label="Words from your sentence — tap to spell"></div>
    </div>

    <button id="mic" class="mic" aria-label="Hold to record">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>

    <p id="status" class="status" aria-live="polite"></p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
