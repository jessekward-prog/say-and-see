server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
  gzip_min_length 256;

  # Never cache the entry point or the service worker — they control updates
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
  location = /service-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
  }
  location = /manifest.webmanifest {
    types { } default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
  }

  # Hashed assets could be cached longer; nothing is hashed yet so keep it short
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }

  # Required for getUserMedia() on iOS over HTTPS via reverse proxy
  add_header Permissions-Policy "microphone=(self)" always;
  add_header Referrer-Policy "same-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
}
